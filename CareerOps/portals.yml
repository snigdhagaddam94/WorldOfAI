# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#   Prefer the BRANDED company careers URL whenever available; use ATS-hosted URL only as fallback.
#   ✅ https://careers.mastercard.com   ⚠️ https://mastercard.wd1.myworkdayjobs.com (fallback only)
#   ✅ https://openai.com/careers       ⚠️ https://job-boards.greenhouse.io/openai (fallback only)
#   Exception: ATS-hosted careers_url is acceptable when no branded careers page exists.
#   Using raw ATS URLs when a branded page exists can cause false 410 errors (job ID mismatch).
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZE] Data Engineering target roles for Vinay Gundamaneni
    # -- Core Data Engineering --
    - "Data Engineer"
    - "Senior Data Engineer"
    - "Lead Data Engineer"
    - "Staff Data Engineer"
    - "Principal Data Engineer"
    - "Data Engineering Manager"
    - "Manager Data Engineering"
    - "Director Data"
    - "Head of Data"
    - "VP Data"
    # -- Analytics & BI --
    - "Analytics Engineer"
    - "Data Analytics Manager"
    - "Analytics Manager"
    - "BI Engineer"
    - "Analytics Lead"
    # -- Platform & Architecture --
    - "Data Platform"
    - "Data Infrastructure"
    - "Data Architect"
    - "Data Architecture"
    - "Data Operations"
    # -- Tools & Tech (broad discovery) --
    - "dbt"
    - "Databricks"
    - "Snowflake"
    - "Spark"
    - "Kafka"
    - "Airflow"
    - "ETL"
    - "ELT"
    - "Data Pipeline"
    - "Data Warehouse"
    - "Data Lakehouse"
    - "Data Lake"
  negative:
    # [CUSTOMIZE] Roles to exclude
    - "Junior"
    - "Intern"
    - "Entry Level"
    - "Associate"
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Mainframe"
    - "COBOL"
    - "Frontend"
    - "QA Engineer"
    - "Test Engineer"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "Manager"
    - "VP"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.
# Customized for Vinay Gundamaneni — Data Engineering roles, US remote, EST

search_queries:
  # -- Ashby --
  - name: Ashby — Senior Data Engineer
    query: 'site:jobs.ashbyhq.com "Senior Data Engineer" OR "Lead Data Engineer" OR "Staff Data Engineer" remote'
    enabled: true

  - name: Ashby — Data Engineering Manager
    query: 'site:jobs.ashbyhq.com "Data Engineering Manager" OR "Manager Data Engineering" OR "Director Data" remote'
    enabled: true

  - name: Ashby — Analytics Engineer
    query: 'site:jobs.ashbyhq.com "Analytics Engineer" OR "Data Analytics Manager" OR "Analytics Manager" remote'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — Senior Data Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Senior Data Engineer" OR "Lead Data Engineer" remote'
    enabled: true

  - name: Greenhouse — Data Engineering Manager
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Data Engineering Manager" OR "Director Data Engineering" remote'
    enabled: true

  - name: Greenhouse — Analytics Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Analytics Engineer" OR "Data Platform" remote'
    enabled: true

  # -- Lever --
  - name: Lever — Senior Data Engineer
    query: 'site:jobs.lever.co "Senior Data Engineer" OR "Lead Data Engineer" OR "Staff Data Engineer" remote'
    enabled: true

  - name: Lever — Data Engineering Manager
    query: 'site:jobs.lever.co "Data Engineering Manager" OR "Director Data" OR "Head of Data" remote'
    enabled: true

  # -- Workable --
  - name: Workable — Data Engineering
    query: 'site:apply.workable.com "Senior Data Engineer" OR "Data Engineering Manager" OR "Analytics Engineer" remote'
    enabled: true

  # -- Remote job boards (US-focused) --
  - name: Remotive — Senior Data Engineer
    query: 'site:remotive.com "Senior Data Engineer" OR "Lead Data Engineer" OR "Data Engineering Manager" remote'
    enabled: true

  - name: WeWorkRemotely — Data Engineering
    query: 'site:weworkremotely.com "Data Engineer" OR "Analytics Engineer" OR "Data Platform" senior OR lead'
    enabled: true

  - name: RemoteOK — Data Engineering
    query: 'site:remoteok.com "Senior Data Engineer" OR "Lead Data Engineer" OR "Data Engineering Manager"'
    enabled: true

  - name: Himalayas — Data Engineering
    query: 'site:himalayas.app "Senior Data Engineer" OR "Lead Data Engineer" OR "Data Engineering Manager" OR "Analytics Engineer" remote'
    enabled: true

  # -- Broad cross-portal discovery --
  - name: Senior Data Engineer — All portals
    query: '"Senior Data Engineer" OR "Lead Data Engineer" remote Snowflake OR Databricks OR Spark OR dbt'
    enabled: true

  - name: Data Engineering Manager — All portals
    query: '"Data Engineering Manager" OR "Manager Data Engineering" OR "Director Data Engineering" remote'
    enabled: true

  - name: Data Architect — All portals
    query: '"Data Architect" OR "Principal Data Engineer" remote Snowflake OR Databricks OR cloud'
    enabled: true

  - name: HN Who's Hiring — Data Engineering
    query: 'site:news.ycombinator.com "Data Engineer" OR "Analytics Engineer" OR "Data Platform" senior remote'
    enabled: true

  - name: YC Jobs — Data Engineering
    query: 'site:workatastartup.com "Senior Data Engineer" OR "Data Engineering Manager" OR "Analytics Engineer" remote'
    enabled: true

